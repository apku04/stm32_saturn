# OpenOCD config for STM32U073CBT6 via RPi 5 GPIO bitbang SWD
#
# Wiring:
#   nRST  -> GPIO17 (pin 12)
#   SWCLK -> GPIO25 (pin 22)
#   SWDIO -> GPIO24 (pin 18)
#   GND   -> pin 20 (or any GND pin)
#   VCC   -> 3.3V from target (do NOT connect RPi 3.3V if board has own supply)

adapter driver linuxgpiod
transport select swd

# RP1 GPIO chip on RPi 5 is gpiochip0
adapter gpio swclk -chip 0 25
adapter gpio swdio -chip 0 24
adapter gpio srst  -chip 0 17
reset_config srst_only srst_push_pull

adapter speed 1000

source [find target/stm32u0x.cfg]
